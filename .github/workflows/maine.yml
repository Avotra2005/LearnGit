name : LearnGit

on : push

jobs:
  LearnGit:
    name : LearnGit base actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run LearnGit
        uses: github/LearnGit@v3
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
